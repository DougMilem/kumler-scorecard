<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kumler Group — Agent Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #0D1B2A;
    --navy2:     #132333;
    --slate:     #1E3A52;
    --sky:       #4A8FBF;
    --ice:       #C8E6F5;
    --gold:      #D4A843;
    --gold2:     #F0C96A;
    --white:     #F0F4F8;
    --muted:     #7A9BB5;
    --border:    rgba(255,255,255,0.07);
    --green:     #2ECC8A;
    --green-bg:  rgba(46,204,138,0.08);
    --green-bdr: rgba(46,204,138,0.22);
    --yellow:    #F0C96A;
    --yellow-bg: rgba(240,201,106,0.08);
    --yellow-bdr:rgba(240,201,106,0.22);
    --red:       #E8685C;
    --red-bg:    rgba(232,104,92,0.08);
    --red-bdr:   rgba(232,104,92,0.22);
    --card:      rgba(255,255,255,0.035);
    --card-bdr:  rgba(255,255,255,0.08);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.55;
  }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 200;
    height: 56px;
    background: rgba(13,27,42,0.94);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 28px; gap: 16px;
  }
  .logo {
    width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
    background: linear-gradient(135deg, #4A8FBF 0%, #D4A843 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--navy); letter-spacing: -0.3px;
  }
  .brand { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .brand em { font-style: normal; color: var(--gold2); }
  .topbar-spacer { flex: 1; }
  #lastUpdated {
    font-size: 11px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .btn-refresh {
    display: flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--card-bdr);
    color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .btn-refresh:hover { border-color: var(--sky); background: rgba(74,143,191,0.12); }
  .btn-refresh svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* ── PAGE ── */
  .page { max-width: 1240px; margin: 0 auto; padding: 32px 28px 80px; }

  /* ── HERO ── */
  .hero { margin-bottom: 32px; }
  .hero-eye {
    font-size: 10px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--sky); margin-bottom: 8px;
  }
  .hero-title {
    font-size: 26px; font-weight: 300; letter-spacing: -0.4px; line-height: 1.2;
  }
  .hero-title strong { font-weight: 600; }
  .hero-sub { font-size: 13px; color: var(--muted); margin-top: 5px; }

  /* ── SUMMARY STRIP ── */
  .summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 28px; }
  .s-tile {
    background: var(--card); border: 1px solid var(--card-bdr);
    border-radius: 10px; padding: 16px 18px;
  }
  .s-tile.hi { border-color: rgba(74,143,191,0.3); background: rgba(74,143,191,0.07); }
  .s-tile .s-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 8px; }
  .s-tile .s-val { font-size: 28px; font-weight: 600; letter-spacing: -0.8px; line-height: 1; }
  .s-tile.hi .s-val { color: var(--sky); }
  .s-tile .s-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .tb-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  select, input[type=text] {
    background: var(--card); border: 1px solid var(--card-bdr);
    color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 7px 11px; border-radius: 7px; outline: none;
    transition: border-color .15s;
  }
  select:focus, input[type=text]:focus { border-color: var(--sky); }
  select option { background: #132333; }
  input::placeholder { color: var(--muted); }
  .btn-sm {
    background: transparent; border: 1px solid var(--card-bdr);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 11px; padding: 6px 12px; border-radius: 6px;
    cursor: pointer; transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn-sm:hover { color: var(--white); border-color: var(--muted); }
  .tb-spacer { flex: 1; }

  /* ── STATE BOXES ── */
  .state-box { text-align: center; padding: 72px 24px; color: var(--muted); }
  .spinner {
    width: 34px; height: 34px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: var(--sky);
    border-radius: 50%; animation: spin .75s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-box strong { color: var(--red); display: block; margin-bottom: 6px; font-size: 15px; }
  .state-box code { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  /* ── AGENT CARDS ── */
  .agent-list { display: flex; flex-direction: column; gap: 8px; }

  .acard {
    background: var(--card); border: 1px solid var(--card-bdr);
    border-radius: 12px; overflow: hidden;
    transition: border-color .15s;
  }
  .acard:hover { border-color: rgba(255,255,255,0.14); }

  .acard-head {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 18px; cursor: pointer; user-select: none;
  }

  .avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    background: var(--slate);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--ice); letter-spacing: 0.3px;
  }

  .aname { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .rank-pill {
    font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
    letter-spacing: 0.4px; white-space: nowrap; flex-shrink: 0;
  }
  .rank-High   { background: rgba(46,204,138,0.14); color: #4DEBA0; border: 1px solid rgba(46,204,138,0.28); }
  .rank-Fair   { background: rgba(240,201,106,0.14); color: #F5D070; border: 1px solid rgba(240,201,106,0.28); }
  .rank-Low    { background: rgba(232,104,92,0.14);  color: #F08078; border: 1px solid rgba(232,104,92,0.28); }

  .alloc-num {
    font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500;
    color: var(--gold2); flex-shrink: 0; min-width: 72px; text-align: right;
  }
  .chevron {
    width: 15px; height: 15px; color: var(--muted); flex-shrink: 0;
    transition: transform .2s;
  }
  .acard.open .chevron { transform: rotate(180deg); }

  /* ── CARD BODY ── */
  .acard-body {
    display: none;
    padding: 0 18px 16px;
    border-top: 1px solid var(--border);
  }
  .acard.open .acard-body { display: block; }

  .metrics-grid {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 8px; margin: 14px 0 12px;
  }

  .mc {
    border-radius: 8px; padding: 11px 13px; position: relative;
  }
  .mc.above { background: var(--green-bg);  border: 1px solid var(--green-bdr); }
  .mc.at    { background: var(--yellow-bg); border: 1px solid var(--yellow-bdr); }
  .mc.below { background: var(--red-bg);    border: 1px solid var(--red-bdr); }

  .mc-name {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 7px;
  }
  .mc.above .mc-name { color: var(--green); }
  .mc.at    .mc-name { color: var(--yellow); }
  .mc.below .mc-name { color: var(--red); }

  .mc-val {
    font-size: 22px; font-weight: 600; line-height: 1;
    font-family: 'DM Mono', monospace; letter-spacing: -0.5px;
  }
  .mc.above .mc-val { color: #72F0BA; }
  .mc.at    .mc-val { color: #F5D888; }
  .mc.below .mc-val { color: #F09080; }

  .mc-goal { font-size: 10px; margin-top: 5px; color: rgba(255,255,255,0.3); }

  .mc-arrow {
    position: absolute; top: 9px; right: 10px;
    font-size: 13px; font-weight: 700; line-height: 1;
  }
  .mc.above .mc-arrow { color: var(--green); }
  .mc.at    .mc-arrow { color: var(--yellow); }
  .mc.below .mc-arrow { color: var(--red); }

  /* ── ALLOC ROW ── */
  .alloc-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 13px;
  }
  .ar-lbl  { font-size: 11px; color: var(--muted); margin-right: 2px; }
  .ar-base {
    font-size: 11px; font-family: 'DM Mono', monospace;
    background: rgba(255,255,255,0.06); color: var(--muted);
    padding: 2px 8px; border-radius: 4px;
  }
  .ar-ded {
    font-size: 10px; font-family: 'DM Mono', monospace;
    background: rgba(232,104,92,0.1); color: #F09080;
    border: 1px solid rgba(232,104,92,0.2);
    padding: 2px 7px; border-radius: 4px;
  }
  .ar-spacer { flex: 1; }
  .ar-final {
    font-size: 15px; font-weight: 700;
    font-family: 'DM Mono', monospace; color: var(--gold2);
  }

  /* ── NO RESULTS ── */
  .no-results { text-align: center; padding: 48px; color: var(--muted); font-size: 13px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 860px) {
    .summary { grid-template-columns: repeat(2,1fr); }
    .metrics-grid { grid-template-columns: repeat(2,1fr); }
  }
  @media (max-width: 520px) {
    .page { padding: 20px 14px 60px; }
    .topbar { padding: 0 14px; }
    .summary { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">KG</div>
  <span class="brand">Kumler <em>Group</em></span>
  <div class="topbar-spacer"></div>
  <span id="lastUpdated">—</span>
  <button class="btn-refresh" onclick="loadSheet()">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M1 7a6 6 0 1 0 1.2-3.6M1 1v3.5h3.5"/>
    </svg>
    Refresh
  </button>
</header>

<main class="page">

  <div class="hero">
    <div class="hero-eye">Live · Google Sheets</div>
    <h1 class="hero-title"><strong>Agent Scorecard</strong> — Lead Allocation</h1>
    <p class="hero-sub">Data pulled from your Google Sheet on every load. Allocation recalculates automatically.</p>
  </div>

  <div class="summary" id="summary">
    <div class="s-tile" style="height:80px;background:rgba(255,255,255,0.03)"></div>
    <div class="s-tile" style="height:80px;background:rgba(255,255,255,0.03)"></div>
    <div class="s-tile" style="height:80px;background:rgba(255,255,255,0.03)"></div>
    <div class="s-tile" style="height:80px;background:rgba(255,255,255,0.03)"></div>
  </div>

  <div class="toolbar">
    <span class="tb-label">Ranking</span>
    <select id="fRank" onchange="render()">
      <option value="">All</option>
      <option value="High">High</option>
      <option value="Fair">Fair</option>
      <option value="Low">Low</option>
    </select>
    <span class="tb-label" style="margin-left:6px">Status</span>
    <select id="fStatus" onchange="render()">
      <option value="">All agents</option>
      <option value="any-red">Any metric below goal</option>
      <option value="all-good">All on / above goal</option>
    </select>
    <input type="text" id="fSearch" placeholder="Search agent…" style="width:170px" oninput="render()">
    <div class="tb-spacer"></div>
    <button class="btn-sm" onclick="expandAll()">Expand all</button>
    <button class="btn-sm" onclick="collapseAll()">Collapse all</button>
  </div>

  <div id="agentList">
    <div class="state-box"><div class="spinner"></div>Loading from Google Sheets…</div>
  </div>

</main>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID  = '1FdCZcwjK0YZ2PVDaORQfYBqQzUuiG15s';
const SHEET_TAB = 'Sheet1'; // change if your tab has a different name
const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;

// Goals
const GOALS = { trx: 0.05, zhl: 0.10, l6m: 0.45, fub: 6000 };

// Lead allocation base by ranking
const BASE = { High: 20, Fair: 12, Low: 2 };

// ─── STATE ───────────────────────────────────────────────────────────────────
let agents   = [];
let expanded = {};

// ─── LOAD ────────────────────────────────────────────────────────────────────
async function loadSheet() {
  document.getElementById('agentList').innerHTML =
    '<div class="state-box"><div class="spinner"></div>Loading from Google Sheets…</div>';

  try {
    const res = await fetch(CSV_URL + '&cachebust=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    parseAndRender(text);
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch (err) {
    document.getElementById('agentList').innerHTML = `
      <div class="state-box">
        <strong>Could not load Google Sheet</strong>
        <span style="margin-top:6px;display:block;font-size:13px">Make sure the sheet is shared as <em>"Anyone with the link can view"</em>.</span>
        <br><code>${err.message}</code>
      </div>`;
    document.getElementById('lastUpdated').textContent = 'Error';
  }
}

// ─── PARSE CSV ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  // Handles quoted fields with commas inside
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function pct(s) {
  if (!s || s === '' || s === 'N/A') return null;
  const n = parseFloat(s.replace('%', '').replace('"', '').trim());
  return isNaN(n) ? null : n / 100;
}

function num(s) {
  if (!s || s === '' || s === 'N/A') return null;
  const n = parseFloat(s.replace(/[^0-9.-]/g, ''));
  return isNaN(n) ? null : n;
}

function st(val, goal) {
  if (val === null) return 'below';
  if (val > goal)   return 'above';
  if (val === goal) return 'at';
  return 'below';
}

function parseAndRender(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) {
    document.getElementById('agentList').innerHTML =
      '<div class="state-box">Sheet appears empty or unreadable.</div>';
    return;
  }

  // Find header row (first row with "Agent Name")
  let headerIdx = 0;
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    if (rows[i].some(c => c.toLowerCase().includes('agent'))) { headerIdx = i; break; }
  }
  const headers = rows[headerIdx].map(h => h.toLowerCase().trim());

  // Column index helpers
  const col = (keywords) => {
    for (const kw of keywords) {
      const idx = headers.findIndex(h => h.includes(kw));
      if (idx !== -1) return idx;
    }
    return -1;
  };

  const iName    = col(['agent name', 'agent']);
  const iTrx     = col(['logged trx', 'trx']);
  const iZhl     = col(['zhl prequal', 'zhl']);
  const iL6m     = col(['l6m met', 'l6m']);
  const iFub     = col(['fub points', 'fub']);
  const iRanking = col(['ranking']);

  agents = [];

  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[iName] || r[iName].trim() === '' || r[iName].toLowerCase() === 'goal') continue;

    const name    = r[iName].trim();
    const trx     = pct(r[iTrx]);
    const zhl     = pct(r[iZhl]);
    const l6m     = pct(r[iL6m]);
    const fub     = num(r[iFub]);
    const ranking = (r[iRanking] || '').trim() || 'Fair';

    const base = BASE[ranking] || 2;
    const deductions = [];
    if (zhl === null || zhl < GOALS.zhl) deductions.push({ label: 'ZHL',      amt: 6 });
    if (trx === null || trx < GOALS.trx) deductions.push({ label: 'TRX',      amt: 5 });
    if (l6m === null || l6m < GOALS.l6m) deductions.push({ label: 'L6M rate', amt: 4 });
    if (fub === null || fub < GOALS.fub) deductions.push({ label: 'FUB pts',  amt: 4 });
    const alloc = Math.max(0, base - deductions.reduce((s, d) => s + d.amt, 0));

    agents.push({
      name, ranking, trx, zhl, l6m, fub,
      stTrx: st(trx, GOALS.trx),
      stZhl: st(zhl, GOALS.zhl),
      stL6m: st(l6m, GOALS.l6m),
      stFub: st(fub, GOALS.fub),
      base, deductions, alloc,
    });
  }

  renderSummary();
  render();
}

// ─── SUMMARY ─────────────────────────────────────────────────────────────────
function renderSummary() {
  const total    = agents.length;
  const onGoal   = agents.filter(a =>
    a.stTrx !== 'below' && a.stZhl !== 'below' &&
    a.stL6m !== 'below' && a.stFub !== 'below').length;
  const totLeads = agents.reduce((s, a) => s + a.alloc, 0);
  const avg      = total ? Math.round(totLeads / total) : 0;

  document.getElementById('summary').innerHTML = `
    <div class="s-tile">
      <div class="s-lbl">Total agents</div>
      <div class="s-val">${total}</div>
    </div>
    <div class="s-tile">
      <div class="s-lbl">All metrics on / above goal</div>
      <div class="s-val">${onGoal}</div>
      <div class="s-sub">${total ? Math.round(onGoal / total * 100) : 0}% of team</div>
    </div>
    <div class="s-tile hi">
      <div class="s-lbl">Total leads allocated</div>
      <div class="s-val">${totLeads}</div>
      <div class="s-sub">next 30 days</div>
    </div>
    <div class="s-tile">
      <div class="s-lbl">Avg leads per agent</div>
      <div class="s-val">${avg}</div>
    </div>`;
}

// ─── RENDER CARDS ─────────────────────────────────────────────────────────────
function render() {
  const rankF   = document.getElementById('fRank').value;
  const statusF = document.getElementById('fStatus').value;
  const search  = document.getElementById('fSearch').value.toLowerCase();

  const filtered = agents.filter(a => {
    if (rankF && a.ranking !== rankF) return false;
    if (search && !a.name.toLowerCase().includes(search)) return false;
    if (statusF === 'all-good' &&
        (a.stTrx === 'below' || a.stZhl === 'below' ||
         a.stL6m === 'below' || a.stFub === 'below')) return false;
    if (statusF === 'any-red' &&
        a.stTrx !== 'below' && a.stZhl !== 'below' &&
        a.stL6m !== 'below' && a.stFub !== 'below') return false;
    return true;
  });

  if (!filtered.length) {
    document.getElementById('agentList').innerHTML =
      '<div class="no-results">No agents match the current filters.</div>';
    return;
  }

  document.getElementById('agentList').innerHTML = filtered.map(a => {
    const isOpen = !!expanded[a.name];
    const ini    = a.name.split(' ').slice(0, 2).map(p => p[0]).join('').toUpperCase();

    const fmtPct = v => v === null ? 'N/A' : (v * 100).toFixed(1) + '%';
    const fmtNum = v => v === null ? 'N/A' : Math.round(v).toLocaleString();
    const arrow  = s => s === 'above' ? '↑' : s === 'at' ? '=' : '↓';

    const dedHtml = a.deductions.length
      ? a.deductions.map(d => `<span class="ar-ded">−${d.amt} ${d.label}</span>`).join('')
      : '<span style="font-size:11px;color:var(--muted)">No deductions</span>';

    return `
<div class="acard${isOpen ? ' open' : ''}" id="ac-${CSS.escape(a.name)}">
  <div class="acard-head" onclick="toggle(${JSON.stringify(a.name)})">
    <div class="avatar">${ini}</div>
    <span class="aname">${a.name}</span>
    <span class="rank-pill rank-${a.ranking}">${a.ranking}</span>
    <span class="alloc-num">${a.alloc} leads</span>
    <svg class="chevron" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 5l4 4 4-4"/>
    </svg>
  </div>
  <div class="acard-body">
    <div class="metrics-grid">
      <div class="mc ${a.stTrx}">
        <div class="mc-name">Logged TRX</div>
        <div class="mc-val">${fmtPct(a.trx)}</div>
        <div class="mc-goal">Goal: 5%</div>
        <div class="mc-arrow">${arrow(a.stTrx)}</div>
      </div>
      <div class="mc ${a.stZhl}">
        <div class="mc-name">ZHL Prequal / Met</div>
        <div class="mc-val">${fmtPct(a.zhl)}</div>
        <div class="mc-goal">Goal: 10%</div>
        <div class="mc-arrow">${arrow(a.stZhl)}</div>
      </div>
      <div class="mc ${a.stL6m}">
        <div class="mc-name">L6M Met with Rate</div>
        <div class="mc-val">${fmtPct(a.l6m)}</div>
        <div class="mc-goal">Goal: 45%</div>
        <div class="mc-arrow">${arrow(a.stL6m)}</div>
      </div>
      <div class="mc ${a.stFub}">
        <div class="mc-name">LM FUB Points</div>
        <div class="mc-val">${fmtNum(a.fub)}</div>
        <div class="mc-goal">Goal: 6,000</div>
        <div class="mc-arrow">${arrow(a.stFub)}</div>
      </div>
    </div>
    <div class="alloc-row">
      <span class="ar-lbl">Lead allocation</span>
      <span class="ar-base">Base ${a.base} · ${a.ranking}</span>
      ${dedHtml}
      <div class="ar-spacer"></div>
      <span class="ar-final">${a.alloc} leads</span>
    </div>
  </div>
</div>`;
  }).join('');
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function toggle(name) {
  expanded[name] = !expanded[name];
  render();
}
function expandAll()  { agents.forEach(a => expanded[a.name] = true);  render(); }
function collapseAll(){ expanded = {};                                   render(); }

// ─── BOOT ─────────────────────────────────────────────────────────────────────
loadSheet();
</script>
</body>
</html>
